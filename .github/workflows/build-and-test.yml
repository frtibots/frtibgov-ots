name: Build and test Jekyll USWDS

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      LANG: en_US.UTF-8
      LANGUAGE: en_US
      LC_ALL: en_US.UTF-8

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: false

        -name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

          -namre: Install npm dependencies
        run: npm ci

      - name: Setup ruby env
        run: |
          sudo apt-get update
          sudo apt-get install --reinstall -y locales
          sudo sed -i 's/# en_US.UTF-8 UTF-8/en_US.UTF-8 UTF-8/' /etc/locale.gen
          sudo locale-gen en_US.UTF-8

      - name: Install ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2.11"
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll build --trace
      

      - name: Run htmlproofer
        run: bundle exec htmlproofer ./_site --assume-extension --disable-external
